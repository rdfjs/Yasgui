<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/yasgui.png" />
    <link rel="stylesheet" href="./style.css" />
    <title>YASR</title>
  </head>
  <body>
    <div class="navBar">
      <nav style="display: flex">
        <img class="logo" src="/yasgui.png" style="max-height:50px;padding:5px;margin-left: 10px" alt="Yasgui Logo" />
        <ul style="display: flex; list-style: none; align-self: center">
          <li class="navItem"><a class="nav-link" href="/">Yasgui</a></li>
          <li class="navItem"><a class="nav-link" href="codemirror">CodeMirror</a></li>
          <li class="navItem"><a class="nav-link" href="yasqe">Yasqe</a></li>
          <li class="navItem active"><a class="nav-link" href="yasr">Yasr</a></li>
        </ul>
        <button class="themeToggle" id="darkModeToggle" type="button"></button>
      </nav>
    </div>
    <div id="yasqe"></div>
    <div id="yasr"></div>
    <script type="module">
      import Yasqe, { qlueLs } from "@zazuko/yasqe";
      import Yasr from "@zazuko/yasr";
      import { setupThemeToggle, createQlueLsWorker, DEMO_ENDPOINT } from "./utils";

      window.onpageshow = function () {
        const theme = setupThemeToggle((t) => window.yasqe?.setTheme(t));
        window.yasqe = new Yasqe(document.getElementById("yasqe"), {
          theme,
          requestConfig: { endpoint: DEMO_ENDPOINT },
          languageServerWorker: createQlueLsWorker,
          onLanguageClientReady: (languageClient) => qlueLs.configureBackend(languageClient, DEMO_ENDPOINT),
        });
        window.yasqe.on("queryResponse", function (yasqe, response, duration) {
          console.log({ response: response });
          window.yasr.setResponse(response, duration);
        });
        window.yasr = new Yasr(document.getElementById("yasr"), {
          prefixes: function () {
            return window.yasqe.getPrefixesFromQuery();
          },
        });
      };
    </script>
  </body>
</html>
