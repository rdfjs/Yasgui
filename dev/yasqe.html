<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        margin: 0px;
      }
      .navItem a {
        color: #555;
        text-decoration: none;
        padding: 5px;
        padding-right: 15px;
      }
      .navItem a:hover {
        color: #222;
      }
      .navItem.active a {
        color: black;
        font-size: 110%;
      }
    </style>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" />
    <title></title>
  </head>

  <body>
    <div style="background:#eee">
      <nav style="display: flex">
        <img src="/yasgui.png" style="max-height:50px;padding:5px;margin-left: 10px" alt="Yasgui Logo" />
        <ul style="display: flex; list-style: none; align-self: center">
          <li class="navItem"><a class="nav-link" href="/">Yasgui</a></li>
          <li class="navItem active"><a class="nav-link" href="yasqe">Yasqe</a></li>
          <li class="navItem"><a class="nav-link" href="yasr">Yasr</a></li>
        </ul>
      </nav>
    </div>
    <div id="yasqe"></div>
    <script type="module">
      import Yasqe from "@zazuko/yasqe";
      import { createQlueLsClient } from "./qlueLs.ts";

      (async () => {
        // The embedder owns the language server: spin up qlue-ls and hand the
        // connected LSP client to Yasqe. Skip with ?noLsp for a plain editor.
        let lsp;
        const noLsp = document.location.search.indexOf("noLsp") >= 0;
        if (!noLsp) {
          try {
            // No backend configured here, so completion is keyword/variable/structural only.
            // Pass { endpoint, queries } to createQlueLsClient to enable endpoint entity completion.
            const client = await createQlueLsClient();
            lsp = { client };
          } catch (e) {
            console.warn("Could not start qlue-ls; running editor without a language server", e);
          }
        }

        window.yasqe = new Yasqe(document.getElementById("yasqe"), { lsp });
        window.yasqe.on("queryResponse", function () {
          console.log("response event", arguments);
        });
        window.yasqe.on("query", function () {
          console.log("query event", arguments);
        });
      })();
    </script>
  </body>
</html>
