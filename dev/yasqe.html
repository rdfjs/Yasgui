<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/yasgui.png" />
    <link rel="stylesheet" href="./style.css" />
    <title>YASQE</title>
  </head>
  <body>
    <div class="navBar">
      <nav style="display: flex">
        <img class="logo" src="/yasgui.png" style="max-height:50px;padding:5px;margin-left: 10px" alt="Yasgui Logo" />
        <ul style="display: flex; list-style: none; align-self: center">
          <li class="navItem"><a class="nav-link" href="/">Yasgui</a></li>
          <li class="navItem active"><a class="nav-link" href="yasqe">Yasqe</a></li>
          <li class="navItem"><a class="nav-link" href="yasr">Yasr</a></li>
        </ul>
        <button class="themeToggle" id="darkModeToggle" type="button"></button>
      </nav>
    </div>
    <div id="yasqe"></div>
    <script type="module">
      import Yasqe, { qlueLs } from "@zazuko/yasqe";
      import { setupThemeToggle, createQlueLsWorker, DEMO_ENDPOINT } from "./utils";

      window.onpageshow = function () {
        const theme = setupThemeToggle((t) => window.yasqe?.setTheme(t));
        window.yasqe = new Yasqe(document.getElementById("yasqe"), {
          theme,
          languageServerWorker: createQlueLsWorker,
          onLanguageClientReady: (languageClient) => qlueLs.configureBackend(languageClient, DEMO_ENDPOINT),
        });
        window.yasqe.on("queryResponse", function () {
          console.log("response event", arguments);
        });
        window.yasqe.on("query", function () {
          console.log("query event", arguments);
        });
      };
    </script>
  </body>
</html>
